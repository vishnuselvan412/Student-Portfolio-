<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio View</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="view.css">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loader-screen" id="loader-screen">
    <div class="loader-inner">
      <div class="loader-ring"></div>
      <p>Loading Portfolio...</p>
    </div>
  </div>

  <!-- Top Nav Bar -->
  <nav class="view-nav" id="view-nav">
    <div class="nav-logo">
      <span class="nav-logo-icon">✦</span>
      <span>PORTIFY</span>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode">
        <span class="theme-icon">🌙</span>
      </button>
<button class="nav-share-btn" id="share-btn">
        ↗ Share
      </button>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero-section">
    <div class="hero-bg-grid"></div>
    <div class="hero-glow"></div>
    <div class="hero-content">
      <div class="hero-badge" id="hero-badge">
        <span class="badge-dot"></span>
        <span id="hero-department">Student</span>
      </div>
      <h1 class="hero-name" id="hero-name">—</h1>
      <p class="hero-bio" id="hero-bio">Welcome to my portfolio.</p>
      <div class="hero-meta" id="hero-meta"></div>
      <div class="hero-links" id="hero-links"></div>
    </div>
    <div class="hero-scroll-hint">
      <span>scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- Main Content -->
  <main class="portfolio-main">

    <!-- Education -->
    <section class="port-section" id="edu-section">
      <div class="section-label">
        <span class="label-number">01</span>
        <span class="label-text">Education</span>
      </div>
      <h2 class="section-heading">Academic Background</h2>
      <div class="edu-timeline" id="edu-timeline">
        <!-- filled by JS -->
      </div>
    </section>

    <!-- Projects -->
    <section class="port-section" id="proj-section">
      <div class="section-label">
        <span class="label-number">02</span>
        <span class="label-text">Projects</span>
      </div>
      <h2 class="section-heading">Work & Projects</h2>
      <div class="projects-bento" id="projects-bento">
        <!-- filled by JS -->
      </div>
    </section>

    <!-- Skills -->
    <section class="port-section" id="skills-section">
      <div class="section-label">
        <span class="label-number">03</span>
        <span class="label-text">Skills</span>
      </div>
      <h2 class="section-heading">Skills & Technologies</h2>
      <div class="skills-view-grid" id="skills-grid">
        <!-- filled by JS -->
      </div>
    </section>

    <!-- Certificates -->
    <section class="port-section" id="cert-section">
      <div class="section-label">
        <span class="label-number">04</span>
        <span class="label-text">Certificates</span>
      </div>
      <h2 class="section-heading">Achievements</h2>
      <div class="files-grid" id="cert-grid">
        <!-- filled by JS -->
      </div>
    </section>

    <!-- Resumes -->
    <section class="port-section" id="resume-section">
      <div class="section-label">
        <span class="label-number">05</span>
        <span class="label-text">Resume</span>
      </div>
      <h2 class="section-heading">Resume</h2>
      <div class="files-grid" id="resume-grid">
        <!-- filled by JS -->
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="portfolio-footer">
    <p>Built with <span class="footer-accent">Portify</span> &nbsp;✦&nbsp; <span id="footer-name"></span></p>
  </footer>

  <!-- Share Toast -->
  <div class="toast" id="toast">Link copied to clipboard!</div>

  <script type="module" src="view.js"></script>
</body>
</html>
